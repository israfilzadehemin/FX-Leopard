# FX-Leopard Configuration
# Copy this file from config.yaml.example and fill in your values

pairs:
  - EURUSD
  - GBPUSD
  - USDJPY
  - USDCHF
  - AUDUSD
  - USDCAD
  - NZDUSD
  - XAUUSD
  - XAGUSD
  - USOIL
  - UKOIL

timeframes:
  - M5
  - M15
  - H1
  - H4
  - D1

confluence_threshold: 7.0
watch_threshold: 5.0

scoring:
  weights:
    ema_alignment: 2.0
    rsi_condition: 1.5
    macd_crossover: 1.5
    candle_pattern_at_level: 2.0
    price_at_sr: 1.5
    bollinger_signal: 1.0
    news_sentiment: 1.5
    volatility_context: 0.5
  htf_bonus:
    d1_alignment: 0.5
    h4_alignment: 0.3
    h4_contradiction_penalty: -1.0

volatility:
  atr_multiplier: 1.5
  pip_spike_threshold: 30
  spike_window_minutes: 5

notifications:
  channel: telegram
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

api_keys:
  twelvedata: "${TWELVEDATA_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  newsapi: "${NEWSAPI_KEY}"

calendar:
  pre_event_alert_minutes: 15
  min_impact: high

logging:
  signal_db: "data/signals.db"
  log_level: INFO
