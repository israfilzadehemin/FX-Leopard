# FX-Leopard Configuration
# Copy this file to config.yaml and fill in your credentials

pairs:
  - EURUSD
  - GBPUSD
  - USDJPY
  - USDCHF
  - AUDUSD
  - USDCAD
  - NZDUSD
  - XAUUSD
  - XAGUSD
  - USOIL
  - UKOIL

timeframes: [M5, M15, H1, H4, D1]

confluence:
  signal_threshold: 7.0
  watch_threshold: 5.0

notifications:
  channel: telegram
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"

api_keys:
  twelvedata: "YOUR_TWELVEDATA_API_KEY"
  openai: "YOUR_OPENAI_API_KEY"
  newsapi: "YOUR_NEWSAPI_KEY"

volatility:
  atr_multiplier: 1.5
  pip_spike_threshold: 30
  spike_window_minutes: 5

logging:
  level: INFO
  signal_db: signals.db
